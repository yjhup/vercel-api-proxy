<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网络加速</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0d1117; color: #c9d1d9; min-height: 100vh; }
        #header { position: fixed; top: 0; left: 0; right: 0; height: 56px; background: #161b22; display: flex; align-items: center; padding: 0 16px; z-index: 1000; gap: 12px; border-bottom: 1px solid #30363d; }
        #header input { flex: 1; max-width: 600px; height: 36px; padding: 0 14px; border: 1px solid #30363d; border-radius: 6px; background: #21262d; color: #fff; font-size: 14px; }
        #header input:focus { outline: 1px solid #58a6ff; border-color: #58a6ff; }
        #header button { height: 36px; padding: 0 20px; border: none; border-radius: 6px; background: #238636; color: #fff; font-size: 14px; cursor: pointer; font-weight: 500; }
        #header button:hover { background: #2ea44f; }
        #header .direct-btn { background: #58a6ff; }
        #header .direct-btn:hover { background: #79c0ff; }
        #content { margin-top: 56px; padding: 20px; }
        .notice { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 16px; margin-bottom: 20px; }
        .notice h3 { color: #fff; font-size: 16px; margin-bottom: 8px; }
        .notice p { font-size: 14px; color: #8b949e; line-height: 1.6; }
        .notice a { color: #58a6ff; text-decoration: none; }
        .notice a:hover { text-decoration: underline; }
        .warning { background: rgba(248, 81, 73, 0.1); border-color: rgba(248, 81, 73, 0.3); }
        .warning h3 { color: #f85149; }
        .quick-links { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 16px; }
        .quick-links a { padding: 8px 16px; background: #21262d; border: 1px solid #30363d; border-radius: 6px; color: #c9d1d9; text-decoration: none; font-size: 14px; }
        .quick-links a:hover { background: #30363d; }
    </style>
</head>
<body>
    <div id="header">
        <input type="text" id="urlInput" placeholder="输入URL，例如 github.com" />
        <button id="goBtn">加速访问</button>
        <button id="directBtn" class="direct-btn">直接访问</button>
    </div>
    <div id="content">
        <div class="notice warning">
            <h3>⚠️ 访问限制说明</h3>
            <p>部分网站（如 GitHub）对数据中心 IP 有访问限制。如果通过加速访问遇到登录/验证页面，请点击「直接访问」按钮在新标签页打开原始网站。</p>
            <p>登录验证完成后，浏览器会保存登录状态，后续访问将更加顺畅。</p>
        </div>
        <div class="notice">
            <h3>💡 使用方式</h3>
            <p>在上方输入框中输入目标网址，点击「加速访问」按钮开始浏览。</p>
            <div class="quick-links">
                <a href="#" onclick="loadUrl('https://github.com')">GitHub</a>
                <a href="#" onclick="loadUrl('https://github.com/trending')">GitHub Trending</a>
                <a href="#" onclick="loadUrl('https://github.com/explore')">GitHub Explore</a>
            </div>
        </div>
    </div>

    <script>
        const urlInput = document.getElementById('urlInput');
        const goBtn = document.getElementById('goBtn');
        const directBtn = document.getElementById('directBtn');

        function getProxyUrl(url) {
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                url = 'https://' + url;
            }
            const protocol = url.startsWith('https://') ? 'https' : 'http';
            const rest = url.substring(url.indexOf('://') + 3);
            return `${window.location.origin}/${protocol}/${rest}`;
        }

        function loadUrl(url) {
            if (!url) return;
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                url = 'https://' + url;
            }
            urlInput.value = url;
            window.location.href = getProxyUrl(url);
        }

        goBtn.addEventListener('click', () => {
            loadUrl(urlInput.value);
        });

        directBtn.addEventListener('click', () => {
            let url = urlInput.value;
            if (!url) return;
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                url = 'https://' + url;
            }
            window.open(url, '_blank');
        });

        urlInput.addEventListener('keyup', (e) => {
            if (e.key === 'Enter') {
                loadUrl(urlInput.value);
            }
        });
    </script>
</body>
</html>
